# VaultStream — Render blueprint (backend API + Redis).
# Stack: Frontend → Vercel · Backend → Render · Postgres → Neon (external).
# Deploy: push to GitHub, then Render → New → Blueprint → pick this repo,
# then paste DATABASE_URL (your Neon connection string) in the dashboard.
services:
  - type: web
    name: vaultstream-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    plan: starter
    envVars:
      - key: DATABASE_URL
        sync: false            # paste your Neon connection string: postgresql://USER:PASS@ep-xxx.REGION.aws.neon.tech/vaultstream?sslmode=require
      - key: LOCAL_REDIS_URL
        fromService:
          type: keyvalue
          name: vaultstream-redis
          property: connectionString
      - key: CORS_ORIGINS
        sync: false            # set to your Vercel URL, e.g. https://vaultstream.vercel.app
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: NOTIFY_WEBHOOK_URL
        sync: false            # optional Slack/Discord webhook for FRAUD alerts
      - key: GROQ_API_KEY
        sync: false            # powers the VaultAI assistant; without it VaultAI uses the grounded responder
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: MODEL_PATH
        value: models/fraud_model.pkl

# Postgres is hosted on Neon (external) — set DATABASE_URL above. No Render
# database is provisioned. Render Key Value (Redis-compatible) backs the
# feature store below.
keyValue:
  - name: vaultstream-redis
    plan: starter
    ipAllowList: []
