name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pip-audit

      - name: Run tests (mock mode)
        env:
          SUPABASE_JWT_SECRET: your-jwt-secret
        run: |
          cd backend
          pytest -q

      - name: Run pip-audit
        run: |
          cd backend
          pip-audit || true

  frontend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd frontend
          npm ci --legacy-peer-deps

      - name: Typecheck
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Lint
        run: |
          cd frontend
          npm run lint

      - name: Build
        env:
          NEXT_PUBLIC_HTTP_API_URL: https://api.example.com
          NEXT_PUBLIC_WS_API_URL: wss://api.example.com/ws/alerts
        run: |
          cd frontend
          npm run build

      - name: Run npm audit
        run: |
          cd frontend
          npm audit --audit-level=high || true # Prevent failing CI on high vulns unless explicitly desired

      - name: Vercel Preview
        if: github.event_name == 'pull_request'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          cd frontend
          npm i -g vercel
          vercel pull --yes --environment=preview --token=$VERCEL_TOKEN
          vercel build --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --token=$VERCEL_TOKEN
